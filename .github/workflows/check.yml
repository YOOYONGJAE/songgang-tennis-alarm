name: court-check

on:
  # 실행은 외부 트리거(cron-job.org)와 수동 실행으로만 구동한다.
  # GitHub 자체 예약(schedule/cron)은 불규칙해 사용하지 않는다.
  workflow_dispatch: {}

# 이전 실행이 아직 안 끝났으면 중복 실행을 막는다(상태 꼬임 방지)
concurrency:
  group: court-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          # (선택) 데이터베이스 사용량(/사용량) 조회용 관리 API 자격증명.
          # 없으면 /사용량 은 키 개수만 알려준다.
          UPSTASH_EMAIL: ${{ secrets.UPSTASH_EMAIL }}
          UPSTASH_API_KEY: ${{ secrets.UPSTASH_API_KEY }}
        run: python checker.py
